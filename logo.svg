<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="roundedClip">
      <rect width="200" height="200" rx="44" ry="44"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3a7a5e"/>
      <stop offset="100%" stop-color="#2a5c44"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a832"/>
      <stop offset="100%" stop-color="#b8891a"/>
    </linearGradient>
    <filter id="dotTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#bgGrad)"/>

  <!-- Subtle dot texture overlay -->
  <rect width="200" height="200" rx="44" ry="44" fill="none" clip-path="url(#roundedClip)">
    <animate attributeName="opacity" values="1" dur="0s"/>
  </rect>

  <!-- House outline (white, no fill) -->
  <!-- Roof -->
  <polyline points="26,105 100,42 174,105" fill="none" stroke="white" stroke-width="13" stroke-linejoin="round" stroke-linecap="round" clip-path="url(#roundedClip)"/>
  <!-- Left wall -->
  <line x1="38" y1="98" x2="38" y2="158" stroke="white" stroke-width="13" stroke-linecap="round" clip-path="url(#roundedClip)"/>
  <!-- Right wall -->
  <line x1="162" y1="98" x2="162" y2="158" stroke="white" stroke-width="13" stroke-linecap="round" clip-path="url(#roundedClip)"/>

  <!-- Magnifying glass circle -->
  <circle cx="95" cy="118" r="48" fill="#2a5c44" stroke="white" stroke-width="13"/>

  <!-- Bar chart inside magnifying glass -->
  <!-- Left bar -->
  <rect x="68" y="121" width="14" height="24" rx="2" fill="url(#goldGrad)"/>
  <!-- Middle bar (tall) -->
  <rect x="88" y="108" width="14" height="37" rx="2" fill="url(#goldGrad)"/>
  <!-- Right bar (tallest) -->
  <rect x="108" y="100" width="14" height="45" rx="2" fill="url(#goldGrad)"/>
  <!-- Circle dot on top of middle bar -->
  <circle cx="95" cy="102" r="8" fill="url(#goldGrad)"/>

  <!-- Magnifying glass handle -->
  <line x1="133" y1="153" x2="157" y2="177" stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>
